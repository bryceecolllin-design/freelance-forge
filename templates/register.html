{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="panel" style="max-width:720px;margin:0 auto;">
  <h2 style="margin-top:0;">Create your account</h2>
  <form method="post" style="display:grid;gap:12px;">
    <div class="row">
      <div>
        <label for="display_name">Display name</label>
        <input id="display_name" name="display_name" placeholder="How should we show your name?">
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>
      </div>
      <div>
        <label style="display:block;">I want to use the site as:</label>
        <label class="meta" style="display:block;margin:4px 0;">
          <input type="checkbox" name="role_customer" value="1" checked> Customer (post projects)
        </label>
        <label class="meta" style="display:block;margin:4px 0;">
          <input type="checkbox" name="role_contractor" value="1"> Contractor (bid on projects)
        </label>
        <div class="meta">You can change this later (e.g., “Become a Contractor”).</div>
      </div>
    </div>
    <div>
      <button class="btn btn-primary" type="submit">Create account</button>
      <a class="btn" href="{{ url_for('login') }}">Already have an account? Log in</a>
    </div>
  </form>
</section>
{% endblock %}
